name: Deploy to Namecheap cPanel

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- FRONTEND BUILD ---
      - name: Set up Node.js (Frontend)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      # --- BACKEND BUILD ---
      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm install

      - name: Generate Prisma Client
        working-directory: ./backend
        run: npx prisma generate

      - name: Build Backend (TypeScript to JS)
        working-directory: ./backend
        run: npm run build

      # --- DEPLOY FRONTEND ---
      - name: Deploy Frontend via SFTP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 21098
          source: "frontend/dist/*"
          target: "public_html/crm.aljaroshi.com/"
          strip_components: 2

      # --- DEPLOY BACKEND (Only necessary files) ---
      - name: Deploy Backend via SFTP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 21098
          source: "backend/dist/**,backend/prisma/**,backend/package.json,backend/package-lock.json"
          target: "service-mngmnt/backend/"
          strip_components: 1

      # --- RESTART SERVER ---
      - name: Restart Node.js App via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 21098
          script: |
            mkdir -p service-mngmnt/backend/tmp
            touch service-mngmnt/backend/tmp/restart.txt
