name: Deploy to Namecheap cPanel

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- FRONTEND BUILD ---
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm install
          npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      # --- BACKEND BUILD ---
      - name: Build Backend
        working-directory: ./backend
        run: |
          npm install
          npx prisma generate
          npm run build

      # --- DEPLOY FRONTEND ---
      - name: Deploy Frontend via SFTP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 21098
          timeout: 60s
          source: "frontend/dist/*"
          target: "public_html/crm.aljaroshi.com/"
          strip_components: 2

      # --- DEPLOY BACKEND ---
      - name: Deploy Backend via SFTP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 21098
          timeout: 60s
          source: "backend/dist/**,backend/prisma/**,backend/package.json,backend/package-lock.json,backend/.htaccess"
          target: "public_html/api.aljaroshi.com/"
          strip_components: 1

      # --- SERVER COMMANDS (Restart & DB Sync) ---
      - name: Restart & Sync Database via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 21098
          script: |
            cd public_html/api.aljaroshi.com/
            npm install --production
            npx prisma generate
            # Database sync (Important for scratch deployment)
            npx prisma db push --accept-data-loss
            # Restart Passenger
            mkdir -p tmp
            touch tmp/restart.txt

